syntax = "proto3";
package skavl.report.v1;

import "anomaly.proto";

// Request message for generating a report based on anomaly data
message ReportGenerationRequest {
  skavl.anomaly.v1.ProjectMetadata project_metadata = 1;
  repeated skavl.anomaly.v1.AnomalySet anomaly_sets = 2;
  float confidence_threshold = 3;
  string locale = 4; // e.g., "en", "no"
}

// Response containing the URL to the generated report
message ReportGenerationResponse {
  string report_url = 1;
}

// Service for generating reports from anomaly data
service ReportService {
  // Generates a unclassified report based on the provided anomaly sets and metadata
  rpc GenerateReportUnclassified(ReportGenerationRequest) returns (ReportGenerationResponse);
  // Generates a classified report based on the provided anomaly sets and metadata
  rpc GenerateReportClassified(ReportGenerationRequest) returns (ReportGenerationResponse);

}


